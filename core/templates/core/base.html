<!DOCTYPE html>
<html lang="en">
<head>
    <title>Market Hub | Digital Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* The Dark Cinematic Theme */
        body {
            background-color: #0b1120; /* Deep dark background */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        /* Floating Rounded Navbar */
        .navbar-custom {
            background-color: #162032;
            border-radius: 50px;
            margin-top: 20px;
            padding: 10px 30px;
        }
        /* The Neon Green Button */
        .btn-brand {
            background-color: #84cc16;
            color: #000;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            padding: 8px 24px;
            transition: all 0.3s;
        }
        .btn-brand:hover {
            background-color: #a3e635;
            color: #000;
        }
        /* Sleek Cards */
        .card-custom {
            background-color: #162032;
            border: none;
            border-radius: 15px;
            color: white;
            transition: transform 0.3s ease;
        }
        .card-custom:hover {
            transform: translateY(-5px);
        }
        .text-muted-custom { color: #94a3b8; }
        .badge-custom { background-color: #1e293b; color: #cbd5e1; border-radius: 20px; font-weight: 400; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5 shadow-lg">
            <a class="navbar-brand fw-bold text-white" href="/dashboard/">
                <span style="color: #84cc16;">⊚</span> Market Hub
            </a>

            <div class="ms-auto d-flex align-items-center">
                {% if user.is_authenticated %}
                    <a href="/dashboard/" class="nav-link text-white me-4">Dashboard</a>
                    {% if user.userprofile.role == 'customer' %}
                        <a href="/cart/" class="nav-link text-white me-4">Cart</a>
                    {% endif %}
                    <span class="me-4 text-muted-custom small">Role: {{ user.userprofile.role|title }}</span>
                    <a href="/logout/" class="btn btn-brand btn-sm">Logout</a>
                {% else %}
                    <a href="/login/" class="btn btn-brand btn-sm">Get Started</a>
                {% endif %}
            </div>
        </nav>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
