{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg border-0 rounded-3">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4 fw-bold text-primary">Sign In</h3>
                {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                <form method="POST" action="/login/">
                    {% csrf_token %}
                    <input type="text" name="username" class="form-control mb-3 py-2" placeholder="Username" required>
                    <input type="password" name="password" class="form-control mb-4 py-2" placeholder="Password" required>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login to Dashboard</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
